<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnSpace</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --bg2: #17171e; --bg3: #1f1f29; --border: #2e2e3f;
    --accent: #6c63ff; --accent2: #a78bfa; --text: #e8e8f0; --muted: #7070a0;
    --danger: #e05555; --radius: 12px;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; overflow-x: hidden; }
  .screen { display:none; min-height: 100vh; }
  .screen.active { display:flex; }
  
  /* Login box */
  #screen-login { align-items:center; justify-content:center; background:radial-gradient(ellipse at 60% 20%,#1a1440 0%,var(--bg) 70%); }
  .login-box { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:3rem 2.5rem; width:100%; max-width:400px; box-shadow:0 30px 80px rgba(0,0,0,.5); }
  .login-box h1 { font-family:'DM Serif Display',serif; font-size:2rem; margin-bottom:.25rem; background:linear-gradient(120deg,#fff,var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .login-box .subtitle { color:var(--muted); margin-bottom:2rem; font-size:.9rem; }
  .login-err { background:#3a1f1f; border:1px solid #7a3030; color:#f09090; border-radius:8px; padding:.65rem .9rem; font-size:.85rem; margin-bottom:1rem; display:none; }
  
  /* App UI */
  #screen-app { flex-direction: row; }
  .sidebar { width:240px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:1.5rem 1rem; flex-shrink:0; }
  .main-content { flex:1; padding:2rem 2.5rem; overflow-y: auto; }
  .section { display:none; }
  .section.active { display:block; }
  
  /* Elements */
  .inp { display:block; width:100%; padding:.7rem .9rem; background:var(--bg3); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:inherit; margin-bottom:.75rem; outline:none; }
  .btn { display:inline-flex; align-items:center; justify-content:center; padding:.6rem 1.3rem; border-radius:9px; background:var(--accent); color:#fff; border:none; font-weight:600; cursor:pointer; width:100%; transition: 0.2s; }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--muted); }
  .auth-link { color: var(--accent2); cursor: pointer; display: block; margin-top: 0.5rem; font-weight: 500; }
  
  .user-card { margin-top:auto; padding:12px; background:var(--bg3); border-radius:12px; font-size:0.8rem; }
  .list-item { display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid var(--border); }
</style>
</head>
<body>

<div id="screen-login" class="screen active">
  <div class="login-box">
    <h1 id="auth-title">LearnSpace</h1>
    <p id="auth-subtitle" class="subtitle">Vpišite se za dostop do vsebin.</p>
    <div id="login-err" class="login-err"></div>
    
    <label style="font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block;">E-pošta</label>
    <input id="login-email" type="email" class="inp" placeholder="vas@mail.com">
    
    <label style="font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block;">Geslo</label>
    <input id="login-pass" type="password" class="inp" placeholder="••••••••">
    
    <button id="auth-btn" class="btn" onclick="APP.handleAuth()">Prijava</button>

    <div class="auth-footer">
      <span id="toggle-text">Nimate računa?</span>
      <a class="auth-link" id="toggle-link" onclick="APP.toggleAuthMode()">Ustvari račun</a>
      <a class="auth-link" style="font-size: 11px; color: var(--muted); margin-top: 12px;" onclick="APP.forgotPass()">Pozabljeno geslo?</a>
    </div>
  </div>
</div>

<div id="screen-app" class="screen">
  <nav class="sidebar">
    <div style="font-family:'DM Serif Display'; font-size:1.4rem; margin-bottom:2rem;">LearnSpace</div>
    <button class="btn" style="background:none; text-align:left; justify-content:flex-start; color:var(--text); margin-bottom:5px;" onclick="APP.nav('dash')">Domov</button>
    <button id="nav-admin" class="btn" style="background:none; text-align:left; justify-content:flex-start; color:var(--text); display:none;" onclick="APP.nav('admin')">Admin Panel</button>
    
    <div class="user-card">
      <div id="user-display" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:8px;">—</div>
      <button onclick="APP.logout()" style="color:var(--danger); border:none; background:none; cursor:pointer; font-size:0.75rem; font-weight:600;">Odjava</button>
    </div>
  </nav>

  <div class="main-content">
    <div id="sec-dash" class="section active">
      <h2>Moji tečaji</h2>
      <p style="color:var(--muted); margin-top:10px;">Tukaj se bodo pojavili vaši tečaji.</p>
    </div>

    <div id="sec-admin" class="section">
      <h2>Admin Panel</h2>
      <div style="background:var(--bg2); padding:1.5rem; border-radius:15px; margin-top:1.5rem; border:1px solid var(--border);">
        <h3 style="font-size:1rem; margin-bottom:1rem;">Dovoli novega uporabnika</h3>
        <input id="admin-new-email" class="inp" placeholder="novi-učenec@mail.com">
        <button class="btn" onclick="APP.addUser()">Dodaj na seznam</button>
      </div>
      <div id="admin-users-list" style="margin-top:2rem;"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSaI7bxp7LH76LhkUI5wvub0XGMRbXwbY",
  authDomain: "fit-ucilnica.firebaseapp.com",
  projectId: "fit-ucilnica",
  storageBucket: "fit-ucilnica.firebasestorage.app",
  messagingSenderId: "Y702377248893",
  appId: "1:702377248893:web:161eecf07a69570fe68914"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const g = id => document.getElementById(id);
const ekey = email => email.toLowerCase().replace(/[^a-z0-9]/g, "_");

const APP = {
  mode: 'login',

  toggleAuthMode() {
    this.mode = (this.mode === 'login') ? 'signup' : 'login';
    g("auth-title").textContent = (this.mode === 'login') ? "LearnSpace" : "Registracija";
    g("auth-btn").textContent = (this.mode === 'login') ? "Prijava" : "Ustvari račun";
    g("toggle-text").textContent = (this.mode === 'login') ? "Nimate računa?" : "Že imate račun?";
    g("toggle-link").textContent = (this.mode === 'login') ? "Ustvari račun" : "Prijavite se";
  },

  async handleAuth() {
    const email = g("login-email").value.trim();
    const pass = g("login-pass").value;
    const errEl = g("login-err");
    errEl.style.display = "none";

    if (!email || pass.length < 6) { alert("Vpišite pravilen email in geslo (vsaj 6 znakov)."); return; }

    try {
      if (this.mode === 'signup') {
        // Preveri če je mail v allowedUsers
        const snap = await getDoc(doc(db, "allowedUsers", ekey(email)));
        if (!snap.exists()) { throw new Error("Ta e-pošta ni na seznamu odobrenih."); }
        await createUserWithEmailAndPassword(auth, email, pass);
        alert("Račun ustvarjen! Dobrodošli.");
      } else {
        await signInWithEmailAndPassword(auth, email, pass);
      }
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = "block";
    }
  },

  async forgotPass() {
    const email = g("login-email").value.trim();
    if (!email) { alert("Vpišite email."); return; }
    await sendPasswordResetEmail(auth, email);
    alert("Povezava za ponastavitev poslana na email.");
  },

  logout: () => signOut(auth),

  nav(name) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    g("sec-" + name).classList.add("active");
    if (name === 'admin') this.loadUsers();
  },

  async addUser() {
    const email = g("admin-new-email").value.trim();
    if (!email) return;
    await setDoc(doc(db, "allowedUsers", ekey(email)), { email: email });
    g("admin-new-email").value = "";
    this.loadUsers();
  },

  async loadUsers() {
    const snap = await getDocs(collection(db, "allowedUsers"));
    g("admin-users-list").innerHTML = snap.docs.map(d => `
      <div class="list-item">
        <span>${d.data().email}</span>
        <button onclick="APP.delUser('${d.id}')" style="color:var(--danger); background:none; border:none; cursor:pointer; font-size:12px;">Odstrani</button>
      </div>
    `).join("");
  },

  async delUser(id) {
    if(confirm("Odstranim uporabnika?")) {
      await deleteDoc(doc(db, "allowedUsers", id));
      this.loadUsers();
    }
  }
};

// GLAVNI MOTOR - preklaplja zaslone
onAuthStateChanged(auth, async user => {
  if (user) {
    g("screen-login").classList.remove("active");
    g("screen-app").classList.add("active");
    g("user-display").textContent = user.email;
    
    // Preveri če je admin
    const adminSnap = await getDoc(doc(db, "admins", ekey(user.email)));
    if (adminSnap.exists()) {
      g("nav-admin").style.display = "block";
    }
  } else {
    g("screen-app").classList.remove("active");
    g("screen-login").classList.add("active");
  }
});

window.APP = APP;
</script>
</body>
</html>
